<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>
  </defs>

  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#grad)" stroke-width="8"></circle>

  <!-- Inner Circle Background -->
  <circle cx="100" cy="100" r="75" fill="url(#grad)" opacity="0.5"></circle>

  <!-- Letter N -->
  <path d="M70 130 V70 L130 130 V70" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"></path>

</svg>